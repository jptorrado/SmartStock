version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db_estoque
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - estoque_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api_estoque
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DB_HOST=db
      - PORT=${PORT}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - estoque_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ui_estoque
    command: sh -c "npm install && npm run dev"
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_API_URL=http://localhost:${PORT}
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - estoque_network

networks:
  estoque_network:
    driver: bridge

volumes:
  db_data: